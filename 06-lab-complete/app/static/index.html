<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 14px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    header h1 { font-size: 17px; font-weight: 600; flex: 1; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
    .badge.offline { background: #ef444422; color: #ef4444; border-color: #ef444444; }
    .badge.mock { background: #f59e0b22; color: #f59e0b; border-color: #f59e0b44; }
    .config { padding: 8px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .config label { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    .config input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; }
    .config input:focus { outline: none; border-color: #3b82f6; }
    #keyInput { width: 260px; }
    #sessionInfo { font-size: 11px; color: #475569; font-family: monospace; flex: 1; }
    .btn-sm { font-size: 11px; padding: 4px 10px; border-radius: 5px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; }
    .btn-sm:hover { background: #334155; color: #e2e8f0; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { max-width: 760px; padding: 11px 15px; border-radius: 12px; line-height: 1.65; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.user { background: #3b82f6; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
    .msg.assistant { background: #1e293b; border: 1px solid #334155; align-self: flex-start; border-radius: 12px 12px 12px 2px; }
    .msg.error { background: #7f1d1d33; border: 1px solid #ef444444; color: #fca5a5; align-self: flex-start; }
    .msg.thinking { color: #475569; font-style: italic; align-self: flex-start; }
    .msg .meta { font-size: 10px; color: #475569; margin-top: 5px; }
    .input-area { padding: 14px 20px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 8px; align-items: flex-end; }
    textarea { flex: 1; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 8px; font-size: 14px; resize: none; font-family: inherit; outline: none; min-height: 44px; max-height: 140px; }
    textarea:focus { border-color: #3b82f6; }
    button#sendBtn { background: #3b82f6; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; height: 44px; }
    button#sendBtn:hover:not(:disabled) { background: #2563eb; }
    button#sendBtn:disabled { background: #334155; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>AI Agent</h1>
    <span class="badge" id="statusBadge">connecting...</span>
    <span class="badge mock" id="llmBadge" style="display:none"></span>
  </header>

  <div class="config">
    <label>API Key:</label>
    <input type="password" id="keyInput" placeholder="dev-key-change-me-in-production">
    <label>Mode:</label>
    <select id="modeSelect" style="background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:5px 8px;border-radius:6px;font-size:12px;">
      <option value="chat">Chat (lịch sử hội thoại)</option>
      <option value="ask">Ask (câu hỏi đơn)</option>
    </select>
    <span id="sessionInfo">Chưa có session</span>
    <button class="btn-sm" onclick="newSession()">+ New Chat</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg assistant">Xin chào! Nhập API key ở trên rồi bắt đầu hỏi. Chế độ <b>Chat</b> ghi nhớ lịch sử hội thoại.</div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Nhập câu hỏi... (Enter gửi, Shift+Enter xuống dòng)"></textarea>
    <button id="sendBtn" onclick="send()">Gửi</button>
  </div>

  <script>
    const BASE = window.location.origin;
    let sessionId = null;

    async function checkHealth() {
      try {
        const r = await fetch(BASE + '/health');
        const d = await r.json();
        const badge = document.getElementById('statusBadge');
        const llmBadge = document.getElementById('llmBadge');
        badge.textContent = d.status === 'ok' ? 'online' : 'degraded';
        badge.className = 'badge' + (d.status !== 'ok' ? ' offline' : '');
        if (d.checks) {
          llmBadge.style.display = '';
          llmBadge.textContent = d.checks.llm === 'mock' ? 'mock LLM' : 'OpenAI';
          llmBadge.className = 'badge' + (d.checks.llm === 'mock' ? ' mock' : '');
          const redisBadge = document.getElementById('llmBadge');
        }
      } catch {
        document.getElementById('statusBadge').textContent = 'offline';
        document.getElementById('statusBadge').className = 'badge offline';
      }
    }
    checkHealth();
    setInterval(checkHealth, 30000);

    function newSession() {
      sessionId = null;
      document.getElementById('sessionInfo').textContent = 'Chưa có session';
      document.getElementById('chat').innerHTML = '<div class="msg assistant">Cuộc hội thoại mới. Hãy đặt câu hỏi!</div>';
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    document.getElementById('input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 140) + 'px';
    });

    function addMsg(text, role, meta) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        div.appendChild(m);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const input = document.getElementById('input');
      const key = document.getElementById('keyInput').value.trim();
      const mode = document.getElementById('modeSelect').value;
      const text = input.value.trim();
      if (!text) return;
      if (!key) { addMsg('Vui lòng nhập API key trước.', 'error'); return; }

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      addMsg(text, 'user');
      const thinking = addMsg('Đang xử lý...', 'thinking');

      try {
        let url, body;
        if (mode === 'chat') {
          url = BASE + '/chat';
          body = { message: text };
          if (sessionId) body.session_id = sessionId;
        } else {
          url = BASE + '/ask';
          body = { question: text };
        }

        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
          body: JSON.stringify(body)
        });
        const d = await r.json();
        thinking.remove();

        if (r.ok) {
          if (mode === 'chat') {
            sessionId = d.session_id;
            document.getElementById('sessionInfo').textContent = 'Session: ' + sessionId.slice(0, 8) + '... | ' + d.history_length + ' tin nhắn';
            addMsg(d.message, 'assistant', d.model + ' · ' + new Date(d.timestamp).toLocaleTimeString());
          } else {
            addMsg(d.answer, 'assistant', d.model + ' · ' + new Date(d.timestamp).toLocaleTimeString());
          }
        } else {
          const detail = d.detail || JSON.stringify(d);
          addMsg('Lỗi ' + r.status + ': ' + detail, 'error');
        }
      } catch (e) {
        thinking.remove();
        addMsg('Không kết nối được server: ' + e.message, 'error');
      } finally {
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
